<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SUPERPART | Inventory OnHand</title>
<style>
/* =========================
   BASE
========================= */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fafafa;
  color:#111;
  padding-top:70px;
}
/* =========================
   TOPBAR
========================= */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:18px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #eee;
  z-index:100;
  box-sizing:border-box;
}
.logo{
  font-size:12px;
  letter-spacing:3px;
  color:#111;
  text-decoration:none;
}
/* =========================
   LAYOUT
========================= */
.container{
  max-width:800px;
  margin:0 auto;
  padding:20px;
}
/* =========================
   BREADCRUMB ROW
========================= */
.breadcrumb-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.breadcrumb{
  font-size:12px;
  color:#777;
  letter-spacing:1px;
}
.hide-zero-wrap{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:#777;
  white-space:nowrap;
  cursor:pointer;
  user-select:none;
}
.hide-zero-wrap input[type="checkbox"]{
  width:14px;
  height:14px;
  cursor:pointer;
  accent-color:#2f5ea8;
}
/* =========================
   FILTER BAR
========================= */
.filterbar{
  margin-bottom:8px;
}
.filterbar input{
  width:100%;
  padding:10px 12px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
  outline:none;
  box-sizing:border-box;
}
/* =========================
   CATEGORY FILTER CHIPS
========================= */
.cat-filter-bar{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}
.cat-chip{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 12px;
  border-radius:999px;
  border:1px solid #ddd;
  background:#fff;
  font-size:11px;
  letter-spacing:0.5px;
  color:#555;
  cursor:pointer;
  user-select:none;
  transition:0.15s;
}
.cat-chip input[type="checkbox"]{
  width:12px;
  height:12px;
  cursor:pointer;
  accent-color:#2f5ea8;
  margin:0;
}
.cat-chip:hover{
  border-color:#2f5ea8;
  color:#2f5ea8;
}
.cat-chip.active{
  border-color:#2f5ea8;
  background:#f0f5ff;
  color:#2f5ea8;
  font-weight:600;
}
/* =========================
   TABLE WRAP
========================= */
.table-wrap{
  width:100%;
  overflow-x:hidden;
  overflow-y:auto;
  border:1px solid #eee;
  border-radius:12px;
  background:#fff;
  max-height:75vh;
}
/* =========================
   TABLE
========================= */
table{
  width:100%;
  border-collapse:collapse;
}
/* =========================
   HEADER
========================= */
thead th{
  position:sticky;
  top:0;
  background:#2f5ea8;
  color:#fff;
  z-index:50;
  text-align:left;
  font-size:12px;
  padding:12px 10px;
  letter-spacing:1px;
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
}
thead th:hover{
  background:#244a86;
}
/* =========================
   BODY
========================= */
tbody td{
  font-size:13px;
  padding:10px;
  border-bottom:1px solid #f0f0f0;
}
tbody tr:hover{
  background:#f7f7f7;
}
/* =========================
   COLUMN WIDTHS
========================= */
.col-code{
  width:90px;
  white-space:nowrap;
}
.col-desc{
  width:auto;
  word-break:break-word;
  white-space:normal;
}
.col-stock{
  width:50px;
  text-align:right;
  white-space:nowrap;
}
/* =========================
   RESULT COUNT
========================= */
.result-count{
  font-size:11px;
  color:#aaa;
  letter-spacing:0.5px;
  margin-bottom:6px;
  text-align:right;
}
/* =========================
   FLOAT TOP BUTTON
========================= */
#toTop{
  position:fixed;
  bottom:20px;
  right:20px;
  width:42px;
  height:42px;
  border-radius:50%;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
#toTop:hover{
  transform:translateY(-3px);
}
/* =========================
   SORT ICON
========================= */
.sort-arrow{
  font-size:10px;
  margin-left:6px;
  opacity:0.9;
}
/* =========================
   MOBILE
========================= */
@media(max-width:768px){
  .table-wrap{
    overflow-x:hidden;
  }
  thead th.col-stock{
    background:#2f5ea8;
    color:#fff;
  }
  .cat-filter-bar{
    gap:5px;
  }
  .cat-chip{
    font-size:10px;
    padding:4px 10px;
  }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="logo" href="index.html">SUPERPART</a>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- BREADCRUMB ROW -->
  <div class="breadcrumb-row">
    <div class="breadcrumb">HOME / INVENTORY</div>
    <label class="hide-zero-wrap">
      <input type="checkbox" id="hideZero" checked />
      Hide 0 / –
    </label>
  </div>

  <!-- SEARCH -->
  <div class="filterbar">
    <input id="searchBox" type="text" placeholder="Search Item Code / Description / OH..." />
  </div>

  <!-- CATEGORY FILTER CHIPS -->
  <div class="cat-filter-bar">
    <label class="cat-chip" id="chip-lacquer">
      <input type="checkbox" id="cat-lacquer" />
      แลคเกอร์
    </label>
    <label class="cat-chip" id="chip-tape">
      <input type="checkbox" id="cat-tape" />
      กระดาษกาว
    </label>
    <label class="cat-chip" id="chip-primer">
      <input type="checkbox" id="cat-primer" />
      สีพื้น
    </label>
    <label class="cat-chip" id="chip-spray">
      <input type="checkbox" id="cat-spray" />
      สีพ่น
    </label>
    <label class="cat-chip" id="chip-putty">
      <input type="checkbox" id="cat-putty" />
      สีโป๊ว
    </label>
  </div>

  <!-- RESULT COUNT -->
  <div class="result-count" id="result-count"></div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('gbarcode')" class="col-code">
            Item Code <span class="sort-arrow" id="arrow-gbarcode">↕</span>
          </th>
          <th onclick="sortTable('name')">
            Description <span class="sort-arrow" id="arrow-name">↕</span>
          </th>
          <th onclick="sortTable('Onhand_All')" class="col-stock">
            OH <span class="sort-arrow" id="arrow-Onhand_All">↕</span>
          </th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="3">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- FLOAT TOP -->
<div id="toTop">↑</div>

<script>
const API = "https://opensheet.elk.sh/1c24KMRRKILXevLctZr-zaku6y0mD8UMmxo_ckp_ukxI/itemmaster";

// Category filter definitions — keyword searched in gnamechr
const CAT_FILTERS = [
  { id: "cat-lacquer", keyword: "แลคเกอร์พ่นสีรถยนต์", chipId: "chip-lacquer" },
  { id: "cat-tape",    keyword: "กระดาษกาว",           chipId: "chip-tape"    },
  { id: "cat-primer",  keyword: "สีรองพื้น",            chipId: "chip-primer"  },
  { id: "cat-spray",   keyword: "สีพ่น",                chipId: "chip-spray"   },
  { id: "cat-putty",   keyword: "สีโป๊ว",               chipId: "chip-putty"   },
];

let rawData      = [];
let filteredData = [];
let viewData     = [];
let sortState    = { key: null, dir: "asc" };

/* =========================
   LOAD DATA
========================= */
async function loadTable(){
  try {
    const res = await fetch(API);
    rawData = await res.json();
    applyAll();
  } catch(e) {
    document.getElementById("table-body").innerHTML =
      '<tr><td colspan="3">Failed to load data.</td></tr>';
  }
}

/* =========================
   APPLY ALL
========================= */
function applyAll(){
  const q        = document.getElementById("searchBox").value.toLowerCase().trim();
  const hideZero = document.getElementById("hideZero").checked;

  // Which category filters are active?
  const activeCats = CAT_FILTERS.filter(f => document.getElementById(f.id).checked);

  let result = rawData;

  // 1. CATEGORY FILTER (OR logic across active chips)
  if(activeCats.length > 0){
    result = result.filter(i => {
      const gname = String(i.gnamechr || "").toLowerCase();
      return activeCats.some(f => gname.includes(f.keyword.toLowerCase()));
    });
  }

  // 2. TEXT SEARCH
  if(q){
    result = result.filter(i =>
      String(i.gbarcode    || "").toLowerCase().includes(q) ||
      String(i.name        || "").toLowerCase().includes(q) ||
      String(i.gnamechr    || "").toLowerCase().includes(q) ||
      String(i.Onhand_All  || "").toLowerCase().includes(q)
    );
  }

  // 3. HIDE ZERO / DASH
  if(hideZero){
    result = result.filter(i => {
      const v = String(i.Onhand_All || "").trim();
      if(v === "" || v === "-") return false;
      const n = parseFloat(v);
      if(!isNaN(n) && n === 0) return false;
      return true;
    });
  }

  filteredData = result;

  // 4. SORT
  if(sortState.key){
    applySortOnFiltered();
  } else {
    viewData = filteredData;
    renderTable(viewData);
  }

  updateResultCount(viewData.length || filteredData.length);
}

/* =========================
   SORT
========================= */
function sortTable(key){
  if(sortState.key === key){
    sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
  } else {
    sortState.key = key;
    sortState.dir = "asc";
  }
  applySortOnFiltered();
}

function applySortOnFiltered(){
  const { key, dir } = sortState;
  viewData = [...filteredData].sort((a, b) => {
    let v1 = a[key] ?? "";
    let v2 = b[key] ?? "";
    const n1 = parseFloat(v1);
    const n2 = parseFloat(v2);
    if(!isNaN(n1) && !isNaN(n2)){
      return dir === "asc" ? n1 - n2 : n2 - n1;
    }
    v1 = String(v1).toLowerCase();
    v2 = String(v2).toLowerCase();
    if(v1 < v2) return dir === "asc" ? -1 : 1;
    if(v1 > v2) return dir === "asc" ?  1 : -1;
    return 0;
  });
  updateArrows(key, dir);
  renderTable(viewData);
  updateResultCount(viewData.length);
}

/* =========================
   RENDER
========================= */
function renderTable(data){
  const tbody = document.getElementById("table-body");
  if(!data || data.length === 0){
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#aaa;padding:20px;">No results found.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(p => `
    <tr>
      <td class="col-code">${p.gbarcode    || "-"}</td>
      <td class="col-desc">${p.name        || "-"}</td>
      <td class="col-stock">${p.Onhand_All || "0"}</td>
    </tr>
  `).join("");
}

/* =========================
   RESULT COUNT
========================= */
function updateResultCount(n){
  document.getElementById("result-count").textContent =
    n > 0 ? n.toLocaleString() + " items" : "";
}

/* =========================
   ARROWS
========================= */
function updateArrows(active, dir){
  ["gbarcode", "name", "Onhand_All"].forEach(k => {
    const el = document.getElementById("arrow-" + k);
    if(!el) return;
    el.textContent = k === active ? (dir === "asc" ? "↑" : "↓") : "↕";
  });
}

/* =========================
   CHIP ACTIVE STATE
========================= */
function updateChipStyles(){
  CAT_FILTERS.forEach(f => {
    const checked = document.getElementById(f.id).checked;
    const chip    = document.getElementById(f.chipId);
    if(checked) chip.classList.add("active");
    else        chip.classList.remove("active");
  });
}

/* =========================
   INIT
========================= */
window.addEventListener("load", () => {
  document.getElementById("searchBox").addEventListener("input", applyAll);
  document.getElementById("hideZero").addEventListener("change", applyAll);

  CAT_FILTERS.forEach(f => {
    document.getElementById(f.id).addEventListener("change", () => {
      updateChipStyles();
      applyAll();
    });
  });

  loadTable();
});

/* =========================
   TOP BUTTON
========================= */
document.getElementById("toTop").onclick = () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
};
</script>
</body>
</html>
