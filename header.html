<!-- ================= HEADER ================= -->

<style>
/* คุมสไตล์เฉพาะของระบบแถบบาร์ด้านบน */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  box-sizing: border-box; /* สำคัญที่สุด! แก้ปัญหารวม padding ไม่ให้ดันขอบจอล้น */
  padding: 18px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid #eee;
  z-index: 1000;
}

/* ตัวหนังสือโลโก้ SUPERPART สไตล์เดิม */
.logo {
  font-size: 13px;
  letter-spacing: 3px;
  color: #111;
  text-decoration: none;
  font-weight: 600;
  transition: opacity 0.2s;
}

.logo:hover {
  opacity: 0.7;
}

/* ปุ่ม Hamburger Menu */
.menu-btn {
  width: 28px;
  height: 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  z-index: 1001;
}

.menu-btn span {
  height: 2px;
  background: #111;
  width: 100%;
  border-radius: 999px;
  transition: transform 0.3s ease, opacity 0.3s ease; /* เพิ่ม Effect เพื่อความนุ่มนวล */
  transform-origin: left center;
}

/* แถมสไตล์อนิเมชั่นตอนเมนูเปิด (Active) ปุ่มจะไขว้เป็นกากบาทเท่ๆ */
.menu-btn.active span:nth-child(1) {
  transform: rotate(45deg) translate(2px, -2px);
}
.menu-btn.active span:nth-child(2) {
  transform: rotate(-45deg) translate(2px, 2px);
}

/* หน้าต่างเมนูที่ดรอปดาวน์ลงมา */
.menu-dropdown {
  position: fixed;
  top: 68px;
  right: 24px;
  width: 240px;
  box-sizing: border-box; /* กันขอบล้นในตัวดรอปดาวน์ด้วย */
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid #eee;
  border-radius: 18px;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 2px;
  z-index: 2000;
  box-shadow: 0 18px 40px rgba(0,0,0,0.08);
}

.menu-dropdown.active {
  display: flex;
  animation: headerFadeDown 0.25s ease;
}

.menu-dropdown a {
  text-decoration: none;
  color: #111;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.5px;
  padding: 12px 14px;
  border-radius: 12px;
  transition: 0.2s;
}

.menu-dropdown a:hover {
  background: #f5f5f5;
  transform: translateX(4px);
}

/* เส้นคั่นแบ่งหมวดหมู่ */
.menu-divider {
  height: 1px;
  background: #eee;
  margin: 6px 14px;
}

@keyframes headerFadeDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ควบคุมขนาดบนมือถือ */
@media (max-width: 768px) {
  .topbar {
    padding: 16px 20px;
  }
  .menu-dropdown {
    width: calc(100% - 40px);
    right: 20px;
    top: 62px;
  }
}
</style>

<header class="topbar">
  <a href="index.html" class="logo">SUPERPART</a>

  <button class="menu-btn" id="menuBtn" aria-label="Toggle Menu">
    <span></span>
    <span></span>
  </button>
</header>

<nav class="menu-dropdown" id="menuDropdown">
  <a href="index.html">HOME</a>
  <a href="products.html">ALL PRODUCTS</a>
  <a href="inventory.html">INVENTORY ONHAND</a>
  <a href="sales.html">SALES DASHBOARD</a>
  <a href="promo.html">PROMOTIONS</a>
   
  <div class="menu-divider"></div>
   
  <a href="domac.html" style="color: #666;">DOMAC SYSTEM</a>
</nav>
