<!-- ================= FOOTER ================= -->

<style>

/* =========================
   FOOTER
========================= */
.footer{
  background: #0b111e; /* Midnight Blue ดำอมน้ำเงินเข้มลึก */
  color:#ddd;
  padding:70px 24px 40px;
  margin-top:80px;
  position:relative;
  overflow:hidden;
}

.footer::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  /* ปรับแสงเหลือบให้เข้ากับโทนน้ำเงิน */
  background:radial-gradient(circle, rgba(47, 94, 168, 0.12), transparent 70%); 
  top:-200px;
  right:-200px;
}

.footer-inner{
  max-width:1100px;
  margin:0 auto;
  position:relative;
  z-index:2;
}

.footer-grid{
  display:grid;
  grid-template-columns:1.2fr 1fr 1fr;
  gap:40px;
}

.footer-logo{
  font-size:14px;
  letter-spacing:4px;
  margin-bottom:20px;
  color:#fff;
}

.footer-text{
  font-size:14px;
  line-height:1.9;
  color:#a5b1c2; /* ปรับโทนตัวหนังสือให้ออกนวลๆ เข้ากับ midnight */
  max-width:420px;
}

.footer-title{
  font-size:13px;
  letter-spacing:2px;
  color:#fff;
  margin-bottom:18px;
}

.footer-links{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.footer-links a, .footer-links span{
  text-decoration:none;
  color:#a5b1c2;
  font-size:14px;
  transition:0.2s;
}

.footer-links a:hover{
  color:#fff;
  transform:translateX(3px);
}

/* สไตล์เฉพาะสำหรับรายชื่อแบรนด์พาร์ทเนอร์ */
.partner-item {
  font-size: 14px;
  color: #a5b1c2;
  display: flex;
  align-items: center;
}

.footer-bottom{
  margin-top:50px;
  padding-top:24px;
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.footer-copy{
  font-size:12px;
  color:#67748b;
}

.footer-social{
  display:flex;
  gap:10px;
}

.footer-social a{
  width:38px;
  height:38px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-decoration:none;
  font-size:11px;
  transition:0.25s;
}

.footer-social a:hover{
  background:#fff;
  color:#0b111e;
  transform:translateY(-2px);
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){

  .footer-grid{
    grid-template-columns:1fr;
    gap:34px;
  }

  .footer{
    padding:60px 20px 34px;
  }

  .footer-bottom{
    flex-direction:column;
    align-items:flex-start;
  }

}

</style>

<footer class="footer">

  <div class="footer-inner">

    <div class="footer-grid">

      <div>
        <div class="footer-logo">
          SUPERPART
        </div>
        <div class="footer-text">
          ศูนย์รวมสีพ่นรถยนต์ สีโป๊ว แลคเกอร์ และอุปกรณ์งานคาร์แคร์ครบวงจร มุ่งเน้นการจัดหาผลิตภัณฑ์คุณภาพสูง เพื่อประสิทธิภาพสูงสุดในงานพ่นซ่อมสีรถยนต์ของคุณ
        </div>
      </div>

      <div>
        <div class="footer-title">
          NAVIGATION
        </div>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="inventory.html">Inventory OnHand</a>
        </div>
      </div>

      <div>
        <div class="footer-title">
          OUR PARTNERS
        </div>
        <div class="footer-links">
          <span class="partner-item">Nippon Paint</span>
          <span class="partner-item">3M</span>
          <span class="partner-item">DOMAC</span>
          <span class="partner-item">Cromax</span>
        </div>
      </div>

    </div>

    <div class="footer-bottom">

      <div class="footer-copy">
        © 2026 SUPERPART — Automotive Refinish & Supplies System
      </div>


    </div>

  </div>

</footer>
