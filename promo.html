<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SUPERPART | Promotions</title>

<style>
/* =========================
   GLOBAL & LAYOUT COMPACT
========================= */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fafafa;
  color:#111;
  padding-top: 20px;
}

/* =========================
   HEADER & CONTROL BAR
========================= */
.header-wrapper {
  max-width: 1100px;
  margin: 0 auto;
  padding: 10px 20px 10px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 15px;
}

.header-left {
  display: flex;
  flex-direction: column;
}

.breadcrumb{
  font-size:12px;
  color:#888;
  margin-bottom:4px;
  letter-spacing: 1px;
}

.title{
  font-size:26px;
  font-weight:bold;
  letter-spacing:0.5px;
  margin: 0;
}

.control-right-box {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* 🔍 SEARCH BAR UI (12px TEXT) */
.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.search-input {
  font-size: 16px; /* 🎯 ตามบรีฟพี่เป๊ะๆ ครับ */
  padding: 8px 14px 8px 32px;
  width: 240px;
  border: 1px solid #e2e8f0;
  border-radius: 20px;
  outline: none;
  background: #fff;
  color: #333;
  transition: all 0.2s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
}

.search-input:focus {
  border-color: #2f5ea8;
  box-shadow: 0 2px 8px rgba(47, 94, 168, 0.15);
  width: 280px;
}

.search-icon {
  position: absolute;
  left: 12px;
  width: 13px;
  height: 13px;
  fill: #718096;
  pointer-events: none;
}

.status-toggle-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid #e2e8f0;
  cursor: pointer;
  user-select: none;
  font-size: 12px;
  font-weight: 600;
  color: #4a5568;
  transition: all 0.2s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
}
.status-toggle-box:hover {
  border-color: #cbd5e1;
  background: #f8fafc;
}
.status-toggle-box input {
  cursor: pointer;
  width: 14px;
  height: 14px;
  margin: 0;
}

/* =========================
   BRAND FILTER BAR
========================= */
.category-filter-bar {
  max-width: 1100px;
  margin: 10px auto 15px auto;
  padding: 0 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  box-sizing: border-box;
}

.category-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #444;
  cursor: pointer;
  user-select: none;
  position: relative;
  background: #fff;
  padding: 6px 14px;
  border: 1px solid #ddd;
  border-radius: 20px;
  transition: all 0.2s ease;
}

.category-label input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  cursor: pointer;
  height: 0;
  width: 0;
}

.checkmark {
  height: 14px;
  width: 14px;
  background-color: #fff;
  border: 2px solid #ccc;
  border-radius: 50%;
  display: inline-block;
  position: relative;
  transition: all 0.2s ease;
}

.category-label:hover {
  border-color: #2f5ea8;
  background: #f0f5ff;
}

.category-label input:checked ~ .checkmark {
  background-color: #2f5ea8;
  border-color: #2f5ea8;
}

.category-label:has(input:checked) {
  border-color: #2f5ea8;
  background: #f0f5ff;
  color: #2f5ea8;
}

.checkmark:after {
  content: "";
  position: absolute;
  display: none;
  top: 3px;
  left: 3px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: white;
}

.category-label input:checked ~ .checkmark:after {
  display: block;
}

/* =========================
   GRID LAYOUT
========================= */
.container{
  max-width:1100px;
  margin:auto;
  padding:10px 20px 20px;
  box-sizing: border-box;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:20px;
  align-items:start;
}

/* =========================
   STATIC INTRO CARD
========================= */
.promo-card{
  background: linear-gradient(135deg, #0b111e, #1a2536);
  color:#fff;
  border-radius:18px;
  padding:20px;
  min-height:360px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  box-sizing:border-box;
  break-inside: avoid;
  width:100%;
}

.promo-tag{
  font-size:11px;
  letter-spacing:2px;
  opacity:0.7;
  margin-bottom:14px;
}

.promo-main-title{
  font-size:24px;
  font-weight:700;
  line-height:1.2;
  word-break:break-word;
  margin-bottom:12px;
}

.promo-desc{
  font-size:13px;
  line-height:1.6;
  opacity:0.8;
}

/* =========================
   DYNAMIC CARD
========================= */
.card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  border:1px solid #eee;
  transition:0.2s ease;
  width:100%;
  box-sizing:border-box;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 24px rgba(0,0,0,0.10);
}

.img-wrap {
  width: 100%;
  aspect-ratio: 1/1;
  background: #f3f3f3;
  overflow: hidden;
  position: relative;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.status-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: bold;
  letter-spacing: 0.5px;
  color: #fff !important; 
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.promo-type-overlay {
  position: absolute;
  bottom: 10px;
  right: 10px;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  background: rgba(11, 17, 30, 0.75);
  padding: 4px 10px;
  border-radius: 6px;
  letter-spacing: 0.3px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.content{
  padding:14px;
  box-sizing: border-box;
}

/* =========================
   CARD DETAILS & BRAND UI
========================= */
.top-info{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  gap:6px;
}

.promo-code{
  font-size:11px;
  font-weight:700;
  color:#4a5568;
  background: #edf2f7;
  padding:2px 6px;
  border-radius:4px;
}

.brand-badge {
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  background: #2f5ea8;
  padding: 2px 8px;
  border-radius: 12px;
  letter-spacing: 0.3px;
}

.condition-text{
  font-size:13px;
  font-weight:500;
  line-height:1.4;
  margin-bottom:10px;
  color: #4a5568;
  word-break: break-word;
}

.promo1-highlight {
  font-size: 15px;
  font-weight: 700;
  color: #111;
  line-height: 1.4;
  letter-spacing: 0.2px;
  margin-bottom: 10px;
  word-break: break-word;
}

.promo-bullets {
  font-size: 12px;
  color: #4a5568;
  margin: 0 0 12px 0;
  padding-left: 14px;
  line-height: 1.5;
}
.promo-bullets li {
  margin-bottom: 2px;
}

.price-container {
  border-top: 1px dashed #e2e8f0;
  padding-top: 10px;
  margin-bottom: 10px;
}

.sale-price-label {
  font-size: 11px;
  color: #718096;
}

.sale-price-value {
  font-size: 24px;
  font-weight: 800;
  color: #d90429;
  line-height: 1.1;
}

.date-zone {
  border-top: 1px solid #f7fafc;
  padding-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  font-size: 11px;
  color: #718096;
}
.date-line {
  display: flex;
  justify-content: space-between;
}
.date-line span:first-child {
  color: #a0aec0;
}

/* =========================
   LOADING & ERROR
========================= */
.loading{
  text-align:center;
  color:#888;
  padding:60px;
  grid-column:1/-1;
  font-size: 15px;
}

/* =========================
   RESPONSIVE MOBILE
========================= */
@media(max-width:768px){
  body {
    padding-top: 10px;
  }

  .header-wrapper {
    flex-direction: column;
    align-items: flex-start;
    padding: 8px 16px;
    gap: 12px;
  }

  .title{
    font-size:20px;
  }

  .control-right-box {
    width: 100%;
    justify-content: space-between;
    gap: 8px;
  }

  .search-wrapper {
    flex: 1;
  }

  .search-input {
    width: 100%;
    min-width: 0;
  }

  .search-input:focus {
    width: 100%;
  }

  .status-toggle-box {
    padding: 8px 10px;
    font-size: 11px;
    flex-shrink: 0;
  }

  .category-filter-bar {
    padding: 0 16px;
    gap: 8px;
  }

  .category-label {
    padding: 4px 10px;
    font-size: 12px;
  }

  .container{
    padding:8px 16px 16px;
  }

  .grid{
    column-count:2;
    column-gap:10px;
    display:block;
  }

  .card, .promo-card{
    break-inside: avoid;
    margin-bottom:12px;
    display:inline-block;
    width:100%;
  }

  .promo-card{
    min-height:180px;
    border-radius:14px;
    padding:16px;
  }

  .promo-main-title{
    font-size:18px;
    margin-bottom:6px;
  }

  .promo-desc{
    font-size:11px;
  }

  .content{
    padding:10px;
  }

  .promo1-highlight {
    font-size: 14px;
    margin-bottom: 8px;
  }

  .promo-bullets {
    font-size: 11px;
    margin-bottom: 8px;
  }

  .sale-price-value{
    font-size:20px;
  }
}
</style>
</head>

<body>
<BR><BR>
<div id="header-placeholder"></div>

<div class="header-wrapper">
  <div class="header-left">
    <div class="breadcrumb">HOME / PROMOTIONS</div>
    <div class="title">Campaigns</div>
  </div>
  
  <div class="control-right-box">
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" id="global-search-input" class="search-input" placeholder="ค้นหาโปรโมชั่น รหัส แบรนด์ เงื่อนไข..." oninput="processAndRender()">
    </div>

    <label class="status-toggle-box">
      <input type="checkbox" id="active-only-checkbox" checked onchange="processAndRender()" />
      <span>Show Active Only</span>
    </label>
  </div>
</div>

<div class="category-filter-bar" id="brand-filter-bar">
  <label class="category-label">
    <input type="checkbox" class="brand-checkbox" value="Nippon P" onchange="processAndRender()" />
    <span class="checkmark"></span> นิปปอน
  </label>
  <label class="category-label">
    <input type="checkbox" class="brand-checkbox" value="3M" onchange="processAndRender()" />
    <span class="checkmark"></span> 3M
  </label>
  <label class="category-label">
    <input type="checkbox" class="brand-checkbox" value="CROMAX" onchange="processAndRender()" />
    <span class="checkmark"></span> CROMAX
  </label>
  <label class="category-label">
    <input type="checkbox" class="brand-checkbox" value="DOMAC" onchange="processAndRender()" />
    <span class="checkmark"></span> DOMAC
  </label>
</div>

<div class="container">
  <div id="promo-grid" class="grid">
    <div class="loading">Loading promotions...</div>
  </div>
</div>

<script>
// ☁️ SUPABASE PRODUCTION API GATEWAY CONNECTION
const SUPABASE_URL = "https://lhnhmjbdowlmurpvxzew.supabase.co/rest/v1/promo";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxobmhtamJkb3dsbXVycHZ4emV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTIyNTAsImV4cCI6MjA5ODAyODI1MH0.suJwzEkJKLD3tsv2o-fY_hOwatmy7i3-saD3Nt0hb4A";

let allPromotions = [];

fetch("header.html").then(res => res.text()).then(data => {
  document.getElementById("header-placeholder").innerHTML = data;
  initMenuFix();
}).catch(e => {});

fetch("footer.html").then(res => res.text()).then(data => {
  document.body.insertAdjacentHTML("beforeend", data);
}).catch(e => {});

function initMenuFix() {
  let attempts = 0;
  const maxAttempts = 30;

  const bindInterval = setInterval(() => {
    const menuBtn = document.getElementById("menuBtn");
    const menuDropdown = document.getElementById("menuDropdown");
    attempts++;

    if (menuBtn && menuDropdown) {
      clearInterval(bindInterval);
      menuBtn.replaceWith(menuBtn.cloneNode(true));
      const newMenuBtn = document.getElementById("menuBtn");

      newMenuBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        menuDropdown.classList.toggle("active");
      });

      window.addEventListener("click", (e) => {
        if (!newMenuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
          menuDropdown.classList.remove("active");
        }
      });
    }

    if (attempts >= maxAttempts) {
      clearInterval(bindInterval);
    }
  }, 1000);
}

function formatDate(dateStr) {
  if (!dateStr) return "-";
  const dateObj = new Date(dateStr);
  if (isNaN(dateObj.getTime())) return dateStr; 
  
  const day = String(dateObj.getDate()).padStart(2, '0');
  const month = String(dateObj.getMonth() + 1).padStart(2, '0');
  const year = dateObj.getFullYear();
  
  return `${day}/${month}/${year}`;
}

async function fetchPromotions() {
  try {
    const res = await fetch(`${SUPABASE_URL}?select=*`, {
      method: "GET",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json"
      }
    });
    
    if (!res.ok) throw new Error("Supabase Network error response");
    const rawData = await res.json();
    
    // 🧠 เคลียร์ข้อมูลเบิ้ล: สั่งสร้างโครงสร้างใหม่แบบ Row-by-Row 
    allPromotions = rawData.map(item => {
      let cleanItem = {};
      for (let key in item) {
        cleanItem[key] = item[key]; // คีย์ดั้งเดิมตัวเล็กจาก Postgres
        
        // ผูกคีย์เสมือนเพื่อซัพพอร์ตระบบเรนเดอร์เดิมโดยไม่ให้แถวซ้ำเบิ้ล
        if (key === "promocode") cleanItem["PromoCode"] = item[key];
        if (key === "promotype") cleanItem["PromoType"] = item[key];
        if (key === "promo_condition") cleanItem["Promo_Condition"] = item[key];
        if (key === "photolink") cleanItem["PhotoLink"] = item[key];
        if (key === "promostatus") cleanItem["PromoStatus"] = item[key];
        if (key === "brand") cleanItem["Brand"] = item[key];
        if (key === "promo1") cleanItem["Promo1"] = item[key];
        if (key === "promo2") cleanItem["Promo2"] = item[key];
        if (key === "promo3") cleanItem["Promo3"] = item[key];
        if (key === "startdate") cleanItem["StartDate"] = item[key];
        if (key === "enddate") cleanItem["EndDate"] = item[key];
        if (key === "createddate") cleanItem["CreatedDate"] = item[key];
        if (key === "remark") cleanItem["Remark"] = item[key];
        if (key === "salegroup") cleanItem["SaleGroup"] = item[key];
        if (key === "sale_price") cleanItem["ราคาขาย"] = item[key];
      }
      return cleanItem;
    });

    processAndRender();
  } catch (error) {
    console.error("Fetch Error:", error);
    document.getElementById("promo-grid").innerHTML = `
      <div class="loading" style="color:red;">ไม่สามารถเข้าถึงฐานข้อมูลโปรโมชั่นได้ กรุณาตรวจสอบสถานะ API หรือสิทธิ์ RLS</div>
    `;
  }
}

function processAndRender() {
  const grid = document.getElementById("promo-grid");
  const showActiveOnly = document.getElementById("active-only-checkbox").checked;
  const checkedBrands = Array.from(document.querySelectorAll('.brand-checkbox:checked')).map(cb => cb.value);
  const searchKeyword = document.getElementById("global-search-input").value.trim().toLowerCase();
  
  let targetData = allPromotions;

  // 1. ตัวกรองสถานะ Active
  if (showActiveOnly) {
    targetData = targetData.filter(item => {
      const status = String(item.promostatus || item.PromoStatus || "").trim().toLowerCase();
      return status === "active";
    });
  } else {
    targetData = targetData.filter(item => item.promocode || item.PromoCode);
  }

  // 2. ตัวกรองแบรนด์สินค้า
  if (checkedBrands.length > 0) {
    targetData = targetData.filter(p => {
      const bName = String(p.brand || p.Brand || "").trim();
      return checkedBrands.some(b => bName.toLowerCase() === b.toLowerCase());
    });
  }

  // 3. 🔍 GLOBAL SEARCH FILTER (ค้นหาคลุมทุกฟิลด์ตามที่ขอเป๊ะๆ)
  if (searchKeyword) {
    targetData = targetData.filter(p => {
      return (
        String(p.createddate || p.CreatedDate || "").toLowerCase().includes(searchKeyword) ||
        String(p.promocode || p.PromoCode || "").toLowerCase().includes(searchKeyword) ||
        String(p.promotype || p.PromoType || "").toLowerCase().includes(searchKeyword) ||
        String(p.promo_condition || p.Promo_Condition || "").toLowerCase().includes(searchKeyword) ||
        String(p.promo1 || p.Promo1 || "").toLowerCase().includes(searchKeyword) ||
        String(p.promo2 || p.Promo2 || "").toLowerCase().includes(searchKeyword) ||
        String(p.promo3 || p.Promo3 || "").toLowerCase().includes(searchKeyword) ||
        String(p.startdate || p.StartDate || "").toLowerCase().includes(searchKeyword) ||
        String(p.enddate || p.EndDate || "").toLowerCase().includes(searchKeyword) ||
        String(p.promostatus || p.PromoStatus || "").toLowerCase().includes(searchKeyword) ||
        String(p.brand || p.Brand || "").toLowerCase().includes(searchKeyword) ||
        String(p.photolink || p.PhotoLink || "").toLowerCase().includes(searchKeyword) ||
        String(p.remark || p.Remark || "").toLowerCase().includes(searchKeyword) ||
        String(p.salegroup || p.SaleGroup || "").toLowerCase().includes(searchKeyword)
      );
    });
  }

  if (targetData.length === 0) {
    grid.innerHTML = `<div class="loading" style="grid-column: 1/-1;">ไม่พบข้อมูลโปรโมชั่นที่ตรงกับเงื่อนไขการค้นหา</div>`;
    return;
  }

  const staticIntroCard = `
    <div class="promo-card">
      <div class="promo-tag">SUPERPART SYSTEM</div>
      <div class="promo-main-title">Automotive<br>Refinish &<br>Exclusive Offers</div>
      <div class="promo-desc">รวมโปรโมชั่นสีพ่นรถยนต์ เคมีภัณฑ์ และอุปกรณ์ซ่อมบำรุงราคาพิเศษสำหรับอู่และศูนย์บริการคาร์แคร์</div>
    </div>
  `;

  // 🚀 ปล่อยข้อมูลไหลยาวลงมาแบบธรรมชาติ ไม่มีการหั่นแบ่งหน้า pagination อีกต่อไป
  const promoCards = targetData.map(p => {
    const code = p.promocode || p.PromoCode || 'PROMO';
    const type = p.promotype || 'SPECIAL';
    const condition = p.promo_condition || p.Promo_Condition || 'เงื่อนไขพิเศษแคมเปญ';
    const imgUrl = (p.photolink || p.PhotoLink || "").trim();
    const status = p.promostatus || p.PromoStatus || 'Active';
    const brand = p.brand || p.Brand || 'SUPERPART';
    
    const rawPrice = p["ราคาขาย"] || p.sale_price || "";
    let displayPrice = 'ราคาพิเศษ';

    if(rawPrice) {
      const cleanPrice = String(rawPrice).replace(/,/g, '');
      const parsed = parseFloat(cleanPrice);
      displayPrice = !isNaN(parsed) ? `฿${parsed.toLocaleString()}` : rawPrice;
    }

    const isAct = status.toLowerCase() === 'active';
    // ✅ โค้ดใหม่ (ปรับเป็นสีแดง)
    const badgeStyle = isAct 
      ? `background: rgba(22, 163, 74, 0.65); border: 1px solid rgba(22, 163, 74, 0.2);` 
      : `background: rgba(220, 38, 38, 0.75); border: 1px solid rgba(220, 38, 38, 0.3);`;


    const cleanPromo1 = (p.promo1 || p.Promo1) ? String(p.promo1 || p.Promo1).trim() : "";
    const cleanPromo2 = (p.promo2 || p.Promo2) ? String(p.promo2 || p.Promo2).trim() : "";
    const cleanPromo3 = (p.promo3 || p.Promo3) ? String(p.promo3 || p.Promo3).trim() : "";

    let extraBulletsHtml = '';
    if (cleanPromo2 !== "") extraBulletsHtml += `<li>${cleanPromo2}</li>`;
    if (cleanPromo3 !== "") extraBulletsHtml += `<li>${cleanPromo3}</li>`;

    const rawStartDate = p.startdate || p.StartDate || '';
    const rawEndDate = p.enddate || p.EndDate || '';
    
    const formattedStartDate = formatDate(rawStartDate);
    const formattedEndDate = rawEndDate ? formatDate(rawEndDate) : 'จนกว่าจะเปลี่ยนแปลง';

    return `
      <div class="card">
        <div class="img-wrap">
          <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/500x500?text=SUPERPART+PROMO'" alt="Promotion Image">
          <span class="status-badge" style="${badgeStyle}">${status}</span>
          <div class="promo-type-overlay">${type}</div>
        </div>
        <div class="content">
          <div class="top-info">
            <span class="promo-code">${code}</span>
            <span class="brand-badge">${brand}</span>
          </div>
          
          <div class="condition-text">${condition}</div>
          
          ${cleanPromo1 ? `<div class="promo1-highlight">${cleanPromo1}</div>` : ''}
          
          ${extraBulletsHtml ? `<ul class="promo-bullets">${extraBulletsHtml}</ul>` : ''}
          
          <div class="price-container">
            <div class="sale-price-label">ราคาพิเศษเฉพาะแคมเปญ</div>
            <div class="sale-price-value">${displayPrice}</div>
          </div>
          
          <div class="date-zone">
            <div class="date-line">
              <span>เริ่มแคมเปญ:</span>
              <span>${formattedStartDate}</span>
            </div>
            <div class="date-line">
              <span>สิ้นสุดแคมเปญ:</span>
              <span>${formattedEndDate}</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  grid.innerHTML = staticIntroCard + promoCards;
}

fetchPromotions();
</script>

</body>
</html>
